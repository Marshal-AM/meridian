name: Daml CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SDK_VERSION: "3.4.11"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install DPM
        run: curl -fsSL https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Install Daml SDK
        run: dpm install ${{ env.SDK_VERSION }}

      - name: Vendor RedStone canton-connector
        run: bash infra/scripts/vendor-redstone.sh

      - name: Build RedStone DARs
        run: bash infra/scripts/build-redstone-dars.sh

      - name: Build v0.1.0 baseline
        working-directory: daml/packages/meridian-core-v010
        run: dpm build

      - name: Build meridian-receivable v0.1.0 baseline
        working-directory: daml/packages/meridian-receivable-v010
        run: dpm build

      - name: Build v0.2.0 with SCU upgrade
        working-directory: daml/packages/meridian-core
        run: dpm build

      - name: Build all packages
        working-directory: daml
        run: dpm build --all

      - name: Run Daml Script tests
        working-directory: daml/tests
        run: dpm test

      - name: Upload DAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dars-${{ github.sha }}
          path: |
            daml/packages/meridian-core-v010/.daml/dist/*.dar
            daml/packages/meridian-core/.daml/dist/*.dar

  scu-breaking-change-must-fail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install DPM
        run: curl -fsSL https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Install Daml SDK
        run: dpm install ${{ env.SDK_VERSION }}

      - name: Build v0.1.0 baseline for breaking test
        working-directory: daml/packages/meridian-core-v010
        run: dpm build

      - name: Breaking SCU build must fail
        working-directory: daml/packages/meridian-core-breaking
        run: |
          if dpm build 2>&1; then
            echo "ERROR: Breaking change was accepted — SCU enforcement failed"
            exit 1
          else
            echo "OK: Breaking change correctly rejected by SCU compiler"
          fi

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript packages
        run: pnpm build

      - name: Run TypeScript tests
        run: pnpm test
